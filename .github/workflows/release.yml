name: Create Tags and Releases

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '.github/**'
      - '.gitignore'
      - '*.md'
      - 'CHANGELOG.md'
      - 'CLAUDE.md'
      - 'LICENSE'

  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'PATCH'
        type: choice
        options:
          - MAJOR
          - MINOR
          - PATCH

# Only one release job at a time - never cancel a running release.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── Validate ALL modules before releasing ──────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform-plugin-cache
      TF_PLUGIN_CACHE_MAY_BREAK_DEPENDENCY_LOCK_FILE: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.11.5"

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: test/go.mod
          cache-dependency-path: test/go.sum

      - name: Assume management account role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_MGMT_RO_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: terratest-release-${{ github.sha }}

      - name: Assume child account role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TEST_RO_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: terratest-release-${{ github.sha }}-child
          role-chaining: true

      - name: Cache OpenTofu provider plugins
        uses: actions/cache@v5
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: opentofu-providers-${{ runner.os }}-${{ hashFiles('**/providers.tf', '**/versions.tf') }}
          restore-keys: |
            opentofu-providers-${{ runner.os }}-

      - name: Create provider plugin cache dir
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Validate all modules
        run: task validate

      - name: Run Terratest (validate + plan)
        working-directory: test
        run: |
          set -o pipefail
          go test -v -timeout 30m -count=1 2>&1 | tee /tmp/terratest-output.txt

      - name: Terratest Summary
        if: always()
        run: |
          {
            echo "## Terratest Results"
            echo ""
            for test_name in TestValidateAllModules TestPlanAllModules; do
              LABEL=$(echo "$test_name" | sed 's/TestValidateAllModules/Validate/;s/TestPlanAllModules/Plan/')
              PASSED=$(grep -c "PASS: ${test_name}/" /tmp/terratest-output.txt 2>/dev/null || echo "0")
              FAILED=$(grep -c "FAIL: ${test_name}/" /tmp/terratest-output.txt 2>/dev/null || echo "0")
              TOTAL=$((PASSED + FAILED))
              if [ "$TOTAL" = "0" ]; then
                echo "### $LABEL: ⏭️ Skipped"
              elif [ "$FAILED" = "0" ]; then
                echo "### $LABEL: ✅ $PASSED/$TOTAL passed"
              else
                echo "### $LABEL: ❌ $FAILED/$TOTAL failed"
              fi
              echo ""
              if [ "$TOTAL" -gt 0 ]; then
                echo "| Module | Status | Duration |"
                echo "|--------|--------|----------|"
                grep -E "^\s+--- (PASS|FAIL): ${test_name}/" /tmp/terratest-output.txt 2>/dev/null | while IFS= read -r line; do
                  mod=$(echo "$line" | sed "s/.*${test_name}\///" | sed 's/ (.*//')
                  duration=$(echo "$line" | grep -oE '\([0-9.]+s\)' || echo "")
                  if echo "$line" | grep -q "PASS:"; then
                    echo "| \`$mod\` | ✅ | $duration |"
                  else
                    echo "| \`$mod\` | ❌ | $duration |"
                  fi
                done
                echo ""
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Create tag and release ─────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate]
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get the current tag
        id: current_tag
        run: |
          CURRENT_TAG=$(git tag --sort=-v:refname | head -n 1)
          echo "Current tag: $CURRENT_TAG"
          echo "current_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"

      - name: Determine new version
        id: determine_version
        env:
          RAW_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "${{ steps.current_tag.outputs.current_tag }}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major=${BASH_REMATCH[1]}
            minor=${BASH_REMATCH[2]}
            patch=${BASH_REMATCH[3]}
          else
            echo "No valid tag found. Setting to v1.0.0"
            major=1
            minor=0
            patch=0
          fi

          UPDATED_MAJOR_VERSION=$major
          UPDATED_MINOR_VERSION=$minor
          UPDATED_PATCH_VERSION=$((patch + 1))

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUMP_TYPE="${{ inputs.bump }}"
          else
            BUMP_TYPE="PATCH"
            FIRST_LINE=$(echo "$RAW_COMMIT_MSG" | head -n 1)
            echo "Commit message first line: $FIRST_LINE"
            if [[ ${FIRST_LINE,,} =~ ^\[major\] ]]; then
              BUMP_TYPE="MAJOR"
            elif [[ ${FIRST_LINE,,} =~ ^\[minor\] ]]; then
              BUMP_TYPE="MINOR"
            fi
          fi

          echo "Bump type: $BUMP_TYPE"
          if [[ "$BUMP_TYPE" == "MAJOR" ]]; then
            UPDATED_MAJOR_VERSION=$((major + 1))
            UPDATED_MINOR_VERSION=0
            UPDATED_PATCH_VERSION=0
          elif [[ "$BUMP_TYPE" == "MINOR" ]]; then
            UPDATED_MINOR_VERSION=$((minor + 1))
            UPDATED_PATCH_VERSION=0
          fi

          UPDATED_TAG="v$UPDATED_MAJOR_VERSION.$UPDATED_MINOR_VERSION.$UPDATED_PATCH_VERSION"
          echo "Updated tag: $UPDATED_TAG"
          echo "UPDATED_TAG=$UPDATED_TAG" >> "$GITHUB_OUTPUT"

      - name: Create new tag
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git tag "${{ steps.determine_version.outputs.UPDATED_TAG }}"
          git push origin "${{ steps.determine_version.outputs.UPDATED_TAG }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create a release
        run: |
          gh release create "${{ steps.determine_version.outputs.UPDATED_TAG }}" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release failed for ${context.sha.substring(0, 7)}`,
              body: `The release pipeline failed.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'automated']
            })
