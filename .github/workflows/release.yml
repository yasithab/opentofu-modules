name: Create Tags and Releases

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '.github/**'
      - '.gitignore'
      - '*.md'
      - 'CHANGELOG.md'
      - 'CLAUDE.md'
      - 'LICENSE'

  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'PATCH'
        type: choice
        options:
          - MAJOR
          - MINOR
          - PATCH

# Only one release job at a time - never cancel a running release.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── Test changed modules before releasing ──────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform-plugin-cache
      TF_PLUGIN_CACHE_MAY_BREAK_DEPENDENCY_LOCK_FILE: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.11.0"

      - name: Cache OpenTofu provider plugins
        uses: actions/cache@v5
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: opentofu-providers-${{ runner.os }}-${{ hashFiles('**/providers.tf', '**/versions.tf') }}
          restore-keys: |
            opentofu-providers-${{ runner.os }}-

      - name: Create provider plugin cache dir
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Detect changed modules
        id: changes
        run: |
          CHANGED_DIRS=$(git diff --name-only HEAD~1 HEAD | \
            grep '\.tf$' | \
            xargs -I{} dirname {} | \
            sort -u | \
            while read dir; do
              d="$dir"
              while [ "$d" != "." ] && [ ! -f "$d/main.tf" ]; do
                d=$(dirname "$d")
              done
              if [ -f "$d/main.tf" ] && [ -d "$d/tests" ]; then
                echo "$d"
              fi
            done | sort -u)
          echo "$CHANGED_DIRS" > /tmp/changed-modules.txt
          COUNT=$(echo "$CHANGED_DIRS" | grep -c '[^[:space:]]' || echo "0")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Run tests on changed modules
        if: steps.changes.outputs.count != '0'
        run: |
          FAILED=0
          while IFS= read -r mod; do
            [ -z "$mod" ] && continue
            echo "Testing module: $mod"
            cd "$GITHUB_WORKSPACE/$mod"
            tofu init -backend=false -upgrade -no-color > /dev/null 2>&1
            if ! tofu test -no-color; then
              FAILED=$((FAILED + 1))
            fi
            cd "$GITHUB_WORKSPACE"
          done < /tmp/changed-modules.txt
          if [ $FAILED -gt 0 ]; then
            echo "$FAILED module(s) failed tests"
            exit 1
          fi

  # ── Create tag and release ─────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get the current tag
        id: current_tag
        run: |
          CURRENT_TAG=$(git tag --sort=-v:refname | head -n 1)
          echo "Current tag: $CURRENT_TAG"
          echo "current_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"

      - name: Determine new version
        id: determine_version
        env:
          RAW_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "${{ steps.current_tag.outputs.current_tag }}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major=${BASH_REMATCH[1]}
            minor=${BASH_REMATCH[2]}
            patch=${BASH_REMATCH[3]}
          else
            echo "No valid tag found. Setting to v1.0.0"
            major=1
            minor=0
            patch=0
          fi

          UPDATED_MAJOR_VERSION=$major
          UPDATED_MINOR_VERSION=$minor
          UPDATED_PATCH_VERSION=$((patch + 1))

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUMP_TYPE="${{ inputs.bump }}"
          else
            BUMP_TYPE="PATCH"
            FIRST_LINE=$(echo "$RAW_COMMIT_MSG" | head -n 1)
            echo "Commit message first line: $FIRST_LINE"
            if [[ ${FIRST_LINE,,} =~ ^\[major\] ]]; then
              BUMP_TYPE="MAJOR"
            elif [[ ${FIRST_LINE,,} =~ ^\[minor\] ]]; then
              BUMP_TYPE="MINOR"
            fi
          fi

          echo "Bump type: $BUMP_TYPE"
          if [[ "$BUMP_TYPE" == "MAJOR" ]]; then
            UPDATED_MAJOR_VERSION=$((major + 1))
            UPDATED_MINOR_VERSION=0
            UPDATED_PATCH_VERSION=0
          elif [[ "$BUMP_TYPE" == "MINOR" ]]; then
            UPDATED_MINOR_VERSION=$((minor + 1))
            UPDATED_PATCH_VERSION=0
          fi

          UPDATED_TAG="v$UPDATED_MAJOR_VERSION.$UPDATED_MINOR_VERSION.$UPDATED_PATCH_VERSION"
          echo "Updated tag: $UPDATED_TAG"
          echo "UPDATED_TAG=$UPDATED_TAG" >> "$GITHUB_OUTPUT"

      - name: Create new tag
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git tag "${{ steps.determine_version.outputs.UPDATED_TAG }}"
          git push origin "${{ steps.determine_version.outputs.UPDATED_TAG }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create a release
        run: |
          gh release create "${{ steps.determine_version.outputs.UPDATED_TAG }}" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release failed for ${context.sha.substring(0, 7)}`,
              body: `The release pipeline failed.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'automated']
            })
