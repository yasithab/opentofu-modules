name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel any in-progress run for the same PR when a new commit is pushed.
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── 1. Format ─────────────────────────────────────────────────────────────
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
    - name: Check out repository code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.head_ref }}
        token: ${{ secrets.GH_TOKEN || github.token }}
        fetch-depth: 1

    - name: Setup OpenTofu
      uses: opentofu/setup-opentofu@v2
      with:
        tofu_version: "1.11.5"

    - name: Setup Task
      uses: arduino/setup-task@v2

    - name: Format Code
      run: task format

    - name: Commit changes
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add .
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "chore: apply tofu fmt"
          git push
        fi

  # ── 2. Validate all modules ───────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [format]
    permissions:
      contents: read
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform-plugin-cache
      TF_PLUGIN_CACHE_MAY_BREAK_DEPENDENCY_LOCK_FILE: "true"

    steps:
    - name: Check out repository code
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Setup OpenTofu
      uses: opentofu/setup-opentofu@v2
      with:
        tofu_version: "1.11.5"

    - name: Setup Task
      uses: arduino/setup-task@v2

    - name: Cache OpenTofu provider plugins
      uses: actions/cache@v5
      with:
        path: ${{ env.TF_PLUGIN_CACHE_DIR }}
        key: opentofu-providers-${{ runner.os }}-${{ hashFiles('**/providers.tf', '**/versions.tf') }}
        restore-keys: |
          opentofu-providers-${{ runner.os }}-

    - name: Create provider plugin cache dir
      run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

    - name: Validate Modules
      id: validate
      run: |
        set -o pipefail
        task validate 2>&1 | tee /tmp/validate-output.txt
      continue-on-error: true

    - name: Step Summary
      if: always()
      run: |
        {
          echo "## Validate"
          echo ""
          if [ "${{ steps.validate.outcome }}" = "success" ]; then
            echo "✅ All modules validated successfully"
          else
            echo "❌ Validation failed - see output below"
          fi
          echo ""
          echo "<details><summary>Full output</summary>"
          echo ""
          echo '```'
          cat /tmp/validate-output.txt
          echo '```'
          echo ""
          echo "</details>"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Fail if validation errored
      if: steps.validate.outcome != 'success'
      run: exit 1

  # ── 3. Lint all modules ───────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [format]
    permissions:
      contents: read

    steps:
    - name: Check out repository code
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Setup Task
      uses: arduino/setup-task@v2

    - name: Setup tflint
      uses: terraform-linters/setup-tflint@v6
      with:
        tflint_version: latest

    - name: Cache tflint plugins
      uses: actions/cache@v5
      with:
        path: ~/.tflint.d/plugins
        key: tflint-plugins-${{ runner.os }}-${{ hashFiles('.tflint.hcl') }}

    - name: Init tflint plugins
      run: tflint --init

    - name: Lint Modules
      id: lint
      run: |
        set -o pipefail
        task lint 2>&1 | tee /tmp/lint-output.txt
      continue-on-error: true

    - name: Step Summary
      if: always()
      run: |
        {
          echo "## Lint"
          echo ""
          if [ "${{ steps.lint.outcome }}" = "success" ]; then
            echo "✅ No linting issues found"
          else
            echo "❌ Linting issues detected - see output below"
          fi
          echo ""
          echo "<details><summary>Full output</summary>"
          echo ""
          echo '```'
          cat /tmp/lint-output.txt
          echo '```'
          echo ""
          echo "</details>"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Fail if lint errored
      if: steps.lint.outcome != 'success'
      run: exit 1

  # ── 4. Security scan ──────────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [format]
    permissions:
      contents: read

    steps:
    - name: Check out repository code
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Run Trivy security scan
      id: trivy
      uses: aquasecurity/trivy-action@0.35.0
      continue-on-error: true
      with:
        scan-type: config
        scan-ref: .
        format: table
        output: trivy-results.txt
        exit-code: "1"
        severity: CRITICAL,HIGH
        skip-dirs: ".git,.github,.terrateam"
        version: "v0.69.3"
        cache: "true"

    - name: Step Summary
      if: always()
      run: |
        {
          echo "## Security Scan"
          echo ""
          if [ "${{ steps.trivy.outcome }}" = "success" ]; then
            echo "✅ No CRITICAL/HIGH findings"
          else
            echo "❌ CRITICAL/HIGH findings detected - see output below"
          fi
          echo ""
          echo "<details><summary>Trivy scan output</summary>"
          echo ""
          echo '```'
          cat trivy-results.txt 2>/dev/null || echo "(no output)"
          echo '```'
          echo ""
          echo "</details>"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Fail if findings detected
      if: steps.trivy.outcome != 'success'
      run: exit 1
