name: Terratest (On-Demand)

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Which tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all           # validate + plan
          - validate      # validate only (no AWS creds needed)
          - plan          # plan only (requires AWS creds)
      ref:
        description: 'Branch to test (default: master)'
        required: false
        default: 'master'
        type: string

concurrency:
  group: terratest-dispatch
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform-plugin-cache
      TF_PLUGIN_CACHE_MAY_BREAK_DEPENDENCY_LOCK_FILE: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.11.5"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: test/go.mod
          cache-dependency-path: test/go.sum

      - name: Configure AWS credentials via OIDC
        if: inputs.test_type == 'all' || inputs.test_type == 'plan'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_MGMT_RO_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: terratest-dispatch-${{ github.run_id }}

      - name: Cache OpenTofu provider plugins
        uses: actions/cache@v5
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: opentofu-providers-${{ runner.os }}-${{ hashFiles('**/providers.tf', '**/versions.tf') }}
          restore-keys: |
            opentofu-providers-${{ runner.os }}-

      - name: Create provider plugin cache dir
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Run Terratest (validate)
        id: validate_test
        if: inputs.test_type == 'all' || inputs.test_type == 'validate'
        working-directory: test
        run: |
          set -o pipefail
          go test -v -run "TestValidateAllModules" -timeout 15m -count=1 -parallel=4 2>&1 | tee /tmp/validate-test-output.txt
        continue-on-error: true

      - name: Run Terratest (plan)
        id: plan_test
        if: inputs.test_type == 'all' || inputs.test_type == 'plan'
        working-directory: test
        run: |
          set -o pipefail
          go test -v -run "TestPlanAllModules" -timeout 30m -count=1 -parallel=4 2>&1 | tee /tmp/plan-test-output.txt
        continue-on-error: true

      - name: Step Summary
        if: always()
        run: bash .github/scripts/terratest-summary.sh /tmp/validate-test-output.txt /tmp/plan-test-output.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if tests errored
        if: |
          (steps.validate_test.outcome == 'failure') ||
          (steps.plan_test.outcome == 'failure')
        run: exit 1
