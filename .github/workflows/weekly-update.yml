name: Weekly Version Update

on:
  schedule:
    - cron: "0 20 * * 6" # Sunday 00:00 GST (UTC+4) = Saturday 20:00 UTC
  workflow_dispatch:

# Only one update run at a time - cancel a queued run if one is already in progress.
concurrency:
  group: weekly-update
  cancel-in-progress: true

jobs:
  version-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Discover latest stable versions ──────────────────────────────
      - name: Get latest stable OpenTofu version
        id: opentofu
        run: |
          # Use releases list and filter out pre-releases (rc, beta, alpha)
          LATEST=$(curl -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/opentofu/opentofu/releases?per_page=20" \
            | jq -r '[.[] | select(.prerelease == false and .draft == false)] | first | .tag_name | ltrimstr("v")')
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest stable OpenTofu: $LATEST"

      - name: Get latest stable AWS provider version
        id: aws_provider
        run: |
          LATEST=$(curl -sSL \
            "https://registry.terraform.io/v1/providers/hashicorp/aws" \
            | jq -r '.version')
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest AWS provider: $LATEST"

      # ── Install tfupdate (cached) ─────────────────────────────────────
      - name: Get latest tfupdate version
        id: tfupdate_version
        run: |
          VER=$(curl -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/minamijoyo/tfupdate/releases/latest" \
            | jq -r '.tag_name')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Latest tfupdate: $VER"

      - name: Cache tfupdate binary
        id: cache-tfupdate
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/tfupdate
          key: tfupdate-${{ steps.tfupdate_version.outputs.version }}-linux-amd64

      - name: Install tfupdate
        if: steps.cache-tfupdate.outputs.cache-hit != 'true'
        run: |
          VER="${{ steps.tfupdate_version.outputs.version }}"
          curl -sSLo /tmp/tfupdate.tar.gz \
            "https://github.com/minamijoyo/tfupdate/releases/download/${VER}/tfupdate_${VER#v}_linux_amd64.tar.gz"
          tar -xzf /tmp/tfupdate.tar.gz -C /tmp tfupdate
          sudo mv /tmp/tfupdate /usr/local/bin/
          sudo chmod +x /usr/local/bin/tfupdate

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "${{ steps.opentofu.outputs.version }}"

      # ── Apply version bumps ───────────────────────────────────────────
      - name: Update OpenTofu version constraint
        run: |
          tfupdate opentofu --version "${{ steps.opentofu.outputs.version }}" -r .

      - name: Update AWS provider version constraint
        run: |
          tfupdate provider aws --version "${{ steps.aws_provider.outputs.version }}" -r .

      - name: Format
        run: tofu fmt -recursive .

      # ── Create PR if anything changed ─────────────────────────────────
      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_TOKEN }}
          branch: automated/weekly-version-update
          delete-branch: false
          title: "chore: weekly version update - OpenTofu ${{ steps.opentofu.outputs.version }}, AWS provider ${{ steps.aws_provider.outputs.version }}"
          body: |
            ## Automated Weekly Version Update

            | Component | New minimum version |
            |-----------|-------------------|
            | OpenTofu | `>= ${{ steps.opentofu.outputs.version }}` |
            | AWS Provider | `>= ${{ steps.aws_provider.outputs.version }}` |

            **Review checklist before merging:**
            - [ ] Check the [OpenTofu changelog](https://github.com/opentofu/opentofu/releases) for any new built-in functions or deprecations to adopt
            - [ ] Check the [AWS provider changelog](https://github.com/hashicorp/terraform-provider-aws/blob/main/CHANGELOG.md) for removed/renamed arguments in resources this repo uses
            - [ ] Verify PR CI passes (validate + tflint + trivy)

            _Generated by `.github/workflows/weekly-update.yml`_
          commit-message: "chore: update OpenTofu >= ${{ steps.opentofu.outputs.version }}, AWS provider >= ${{ steps.aws_provider.outputs.version }}"
          labels: |
            automated
            dependencies
