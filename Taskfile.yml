version: "3"

tasks:
  format:
    desc: Format all OpenTofu code recursively
    cmds:
      - tofu fmt -recursive .

  validate:
    desc: Run tofu validate in each module directory
    env:
      TF_PLUGIN_CACHE_DIR: "{{.ROOT_DIR}}/.terraform-plugin-cache"
    cmds:
      - mkdir -p "{{.ROOT_DIR}}/.terraform-plugin-cache"
      - |
        JOBS=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
        find . -type f -name "main.tf" -print0 | \
          xargs -0 -P "$JOBS" -I TFMAIN bash -c '
            dir=$(dirname "TFMAIN")
            echo "Validating module: $dir"
            cd "$dir" && tofu init -backend=false -upgrade -no-color > /dev/null && tofu validate -no-color
          '

  lint-init:
    desc: Initialise tflint plugins (run once before first lint)
    cmds:
      - |
        if ! command -v tflint &> /dev/null; then
          echo "tflint is not installed."
          echo "  macOS:  brew install tflint"
          echo "  Linux:  curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash"
          exit 1
        fi
        tflint --init

  lint:
    desc: Run tflint on all modules (run 'task lint-init' once first to install plugins)
    cmds:
      - |
        if ! command -v tflint &> /dev/null; then
          echo "tflint is not installed."
          echo "  macOS:  brew install tflint"
          echo "  Linux:  curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash"
          exit 1
        fi
        JOBS=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
        find . -type f -name "main.tf" -print0 | \
          xargs -0 -P "$JOBS" -I TFMAIN bash -c '
            dir=$(dirname "TFMAIN")
            echo "Linting module: $dir"
            tflint --chdir "$dir"
          '

  security:
    desc: Run Trivy misconfiguration scan (CRITICAL + HIGH)
    cmds:
      - |
        if ! command -v trivy &> /dev/null; then
          echo "trivy is not installed."
          echo "  macOS:  brew install trivy"
          echo "  Linux:  curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin"
          exit 1
        fi
        trivy config \
          --severity CRITICAL,HIGH \
          --skip-dirs ".git,.github,.terrateam" \
          .

  ci:
    desc: Run all CI tasks (format + validate + lint + security)
    deps: [format, validate, lint, security]
